<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HD Mechanic</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app" class="hidden">
        <div id="panel">
            <div id="header">
                <div>
                    <h2 id="plate">—</h2>
                    <span id="model">—</span>
                </div>
                <button id="closeBtn" class="btn btn-sm btn-ghost">×</button>
            </div>

            <div id="limpBanner" class="banner hidden">LIMP MODE — engine capped, needs an advanced repair kit or a full repair</div>

            <div id="body" class="content">
                <div class="section">
                    <h3>Condition</h3>
                    <div class="bar-row">
                        <label>Body</label>
                        <div class="bar"><div id="barBody" class="bar-fill"></div></div>
                        <span id="pctBody">0%</span>
                    </div>
                    <div class="bar-row">
                        <label>Engine</label>
                        <div class="bar"><div id="barEngine" class="bar-fill"></div></div>
                        <span id="pctEngine">0%</span>
                    </div>
                    <div class="bar-row">
                        <label>Fuel Tank</label>
                        <div class="bar"><div id="barTank" class="bar-fill"></div></div>
                        <span id="pctTank">0%</span>
                    </div>
                    <div class="bar-row">
                        <label>Cleanliness</label>
                        <div class="bar"><div id="barDirt" class="bar-fill inverse"></div></div>
                        <span id="pctDirt">0%</span>
                    </div>
                </div>

                <div class="section">
                    <h3>Tyres</h3>
                    <div id="tyreGrid" class="tyre-grid"></div>
                </div>

                <div class="section">
                    <h3>Compliance</h3>
                    <div class="compliance-row">
                        <span class="compliance-label">MOT</span>
                        <span id="motStatus" class="compliance-status">—</span>
                    </div>
                    <div class="compliance-row">
                        <span class="compliance-label">Insurance</span>
                        <span id="insuranceStatus" class="compliance-status">—</span>
                    </div>
                </div>

                <div id="actions" class="section actions hidden">
                    <h3>Actions</h3>
                    <div class="btn-row">
                        <button id="btnRepair" class="btn btn-success">Full Repair</button>
                        <button id="btnMOT" class="btn btn-success">Issue MOT</button>
                        <button id="btnInsurance" class="btn btn-success">Issue Insurance</button>
                    </div>
                    <p id="actionsHint" class="hint">Owner must be present at the shop to pay.</p>
                </div>

                <p id="noServiceHint" class="hint hidden">Bring this vehicle to a shop to repair, MOT, or insure it.</p>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden"></div>

    <script src="js/app.js"></script>
</body>
</html>
