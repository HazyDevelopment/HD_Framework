<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HD Admin</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app" class="hidden">
        <div id="panel">
            <div id="sidebar">
                <div id="brand">
                    <span class="brand-hd">HD</span><span class="brand-admin">ADMIN</span>
                </div>
                <button class="tab-btn active" data-tab="players">Players</button>
                <button class="tab-btn" data-tab="world">World</button>
                <button class="tab-btn" data-tab="bans">Bans</button>
                <button class="tab-btn" data-tab="self">Self</button>
                <div class="sidebar-spacer"></div>
                <button id="closeBtn" class="tab-btn close-btn">Close (ESC)</button>
            </div>

            <div id="content">

                <!-- ═══════════════════════ PLAYERS ═══════════════════════ -->
                <section id="tab-players" class="tab-panel active">
                    <div class="panel-header">
                        <h2>Online Players</h2>
                        <button id="refreshPlayers" class="btn btn-sm">Refresh</button>
                    </div>
                    <div class="players-layout">
                        <div class="table-wrap">
                            <table id="playersTable">
                                <thead>
                                    <tr>
                                        <th>ID</th><th>Name</th><th>CitizenID</th><th>Job</th><th>Ping</th><th></th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>

                        <div id="playerActions" class="action-drawer hidden">
                            <div class="drawer-header">
                                <h3 id="paName">—</h3>
                                <button id="paClose" class="btn btn-sm btn-ghost">×</button>
                            </div>

                            <div class="drawer-row btn-row">
                                <button class="btn" data-act="teleportTo">Teleport To</button>
                                <button class="btn" data-act="bringHere">Bring Here</button>
                                <button class="btn" data-act="heal">Heal</button>
                                <button class="btn" data-act="toggleFreeze">Freeze/Unfreeze</button>
                            </div>

                            <div class="drawer-row">
                                <label>Kick</label>
                                <div class="inline-form">
                                    <input type="text" id="kickReason" placeholder="Reason">
                                    <button class="btn btn-danger btn-sm" data-act="kick">Kick</button>
                                </div>
                            </div>

                            <div class="drawer-row">
                                <label>Ban</label>
                                <div class="inline-form">
                                    <input type="text" id="banReason" placeholder="Reason">
                                    <select id="banDuration">
                                        <option value="1">1 Hour</option>
                                        <option value="24">1 Day</option>
                                        <option value="168">7 Days</option>
                                        <option value="720">30 Days</option>
                                        <option value="">Permanent</option>
                                    </select>
                                    <button class="btn btn-danger btn-sm" data-act="ban">Ban</button>
                                </div>
                            </div>

                            <div class="drawer-row">
                                <label>Give Money</label>
                                <div class="inline-form">
                                    <select id="moneyAccount">
                                        <option value="cash">Cash</option>
                                        <option value="bank">Bank</option>
                                    </select>
                                    <input type="number" id="moneyAmount" placeholder="Amount" min="1">
                                    <button class="btn btn-success btn-sm" data-act="giveMoney">Give</button>
                                </div>
                            </div>

                            <div class="drawer-row">
                                <label>Set Job</label>
                                <div class="inline-form">
                                    <select id="jobSelect"></select>
                                    <select id="jobGrade"></select>
                                    <button class="btn btn-success btn-sm" data-act="setJob">Set</button>
                                </div>
                            </div>

                            <div class="drawer-row">
                                <label>Give Item</label>
                                <div class="inline-form">
                                    <select id="itemSelect"></select>
                                    <input type="number" id="itemAmount" placeholder="Qty" min="1" value="1">
                                    <button class="btn btn-success btn-sm" data-act="giveItem">Give</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- ═══════════════════════ WORLD ══════════════════════════ -->
                <section id="tab-world" class="tab-panel">
                    <div class="panel-header"><h2>World Controls</h2></div>

                    <div class="card">
                        <label>Weather</label>
                        <div class="inline-form">
                            <select id="weatherSelect"></select>
                            <button class="btn btn-success btn-sm" id="applyWeather">Apply</button>
                        </div>
                    </div>

                    <div class="card">
                        <label>Time of Day</label>
                        <div class="inline-form">
                            <input type="number" id="timeHour" min="0" max="23" placeholder="Hour (0-23)">
                            <button class="btn btn-success btn-sm" id="applyTime">Apply</button>
                        </div>
                    </div>

                    <div class="card">
                        <label>Server Announcement</label>
                        <div class="inline-form">
                            <input type="text" id="announceMsg" placeholder="Message to broadcast" maxlength="300">
                            <button class="btn btn-success btn-sm" id="sendAnnounce">Send</button>
                        </div>
                    </div>
                </section>

                <!-- ═══════════════════════ BANS ═══════════════════════════ -->
                <section id="tab-bans" class="tab-panel">
                    <div class="panel-header">
                        <h2>Active Bans</h2>
                        <button id="refreshBans" class="btn btn-sm">Refresh</button>
                    </div>
                    <div class="table-wrap">
                        <table id="bansTable">
                            <thead>
                                <tr>
                                    <th>Name</th><th>Reason</th><th>By</th><th>Expires</th><th></th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </section>

                <!-- ═══════════════════════ SELF ═══════════════════════════ -->
                <section id="tab-self" class="tab-panel">
                    <div class="panel-header"><h2>Self</h2></div>

                    <div class="card btn-row">
                        <button class="btn" id="btnNoclip">Noclip: OFF</button>
                        <button class="btn" id="btnGodmode">God Mode: OFF</button>
                        <button class="btn" id="btnWaypoint">Teleport To Waypoint</button>
                    </div>

                    <div class="card">
                        <label>Spawn Vehicle</label>
                        <div class="inline-form">
                            <input type="text" id="vehModel" placeholder="Model name, e.g. adder">
                            <button class="btn btn-success btn-sm" id="spawnVeh">Spawn</button>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </div>

    <div id="toast" class="hidden"></div>

    <script src="js/app.js"></script>
</body>
</html>
