<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HD Society</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="panel" class="hidden">
    <div class="header">
        <span class="header-title" id="label">Society Funds</span>
        <button class="icon-btn" id="closeBtn">✕</button>
    </div>
    <div class="balance-box">
        <span class="balance-label">Balance</span>
        <span class="balance-value" id="balance">£0</span>
    </div>
    <div class="field-row">
        <input type="number" id="amountInput" placeholder="Amount" min="1">
    </div>
    <div class="actions">
        <button class="btn-deposit" id="depositBtn">Deposit</button>
        <button class="btn-withdraw" id="withdrawBtn">Withdraw</button>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
