<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HD Radio</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
    #channelChip {
        position: fixed;
        left: 20px;
        bottom: 90px;
        background: rgba(10, 11, 14, 0.8);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 8px;
        padding: 6px 12px;
        color: #EDEDED;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        display: none;
    }
    #channelChip.on { display: block; }
    #channelChip.talking { border-color: #D8892B; color: #D8892B; }
</style>
</head>
<body>
<div id="channelChip">CH —</div>
<script src="js/app.js"></script>
</body>
</html>
