<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UKHS Terminal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app" class="hidden">
  <div id="topbar">
    <span id="brand-title"></span>
    <button id="close-btn" title="Close">&times;</button>
  </div>

  <div id="body">
    <nav id="sidebar">
      <button class="nav-btn" data-view="armoury">Equipment Store</button>
      <button class="nav-btn" data-view="garage">Garage</button>
      <button class="nav-btn" data-view="gps">GPS Tracker</button>
    </nav>

    <main id="content">

      <section id="view-armoury" class="view">
        <h1>Equipment store</h1>
        <p class="muted" id="armoury-rank"></p>
        <div class="card" style="margin-top:14px;">
          <div class="section-title">Medical equipment</div>
          <div id="armoury-items" class="result-list"></div>
        </div>
        <button class="primary" id="draw-loadout-btn" style="margin-top:16px;">Draw full kit</button>
      </section>

      <section id="view-garage" class="view">
        <h1>Vehicle garage</h1>
        <p class="muted">Vehicles are locked to your rank — anything below is what you're currently cleared to pull.</p>
        <div id="garage-list" class="result-list" style="margin-top:14px;"></div>
        <button class="secondary" id="return-vehicle-btn" style="margin-top:16px;">Return nearest vehicle</button>
      </section>

      <section id="view-gps" class="view">
        <h1>GPS tracker</h1>
        <p class="muted">Live on-duty units. Set a waypoint to pull up a route.</p>
        <div id="gps-list" class="result-list" style="margin-top:14px;"></div>
      </section>

    </main>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
